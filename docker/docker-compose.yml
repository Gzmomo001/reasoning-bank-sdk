services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: rb-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma_data
      - ./config.yaml:/config.yaml
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - reasoning-bank

  api:
    image: ghcr.io/gzmomo001/reasoning-bank-sdk-api:latest
    container_name: rb-api
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./logs/api:/app/logs
    environment:
      - STORAGE=chroma
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-False}
      - LOG_DIR=/app/logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - reasoning-bank

  mcp:
    image: ghcr.io/gzmomo001/reasoning-bank-sdk-mcp:latest
    container_name: rb-mcp
    ports:
      - "9000:9000"
    depends_on:
      api:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./logs/mcp:/app/logs
    environment:
      - STORAGE=chroma
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-False}
      - LOG_DIR=/app/logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - reasoning-bank

  inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: rb-inspector
    ports:
      - "6274:6274"
      - "6277:6277"
    depends_on:
      mcp:
        condition: service_healthy
    environment:
      - HOST=0.0.0.0
      - DANGEROUSLY_OMIT_AUTH=true
      - MCP_SERVER_URL=http://mcp:9000/mcp
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - reasoning-bank

networks:
  reasoning-bank:
    driver: bridge
