name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docker-publish.yml"
      - "docker/Dockerfile.api"
      - "docker/Dockerfile.mcp"
      - "docker/docker-compose*.yml"
      - "docker/docker-entrypoint.sh"
      - "docker/tests/**"
      - "reasoning_bank/**"
      - "reasoning_bank_api/**"
      - "reasoning_bank_mcp/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile.api
            image_key: api
          - dockerfile: docker/Dockerfile.mcp
            image_key: mcp

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Prepare lowercase image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "api=ghcr.io/${OWNER}/reasoning-bank-sdk-api" >> "$GITHUB_OUTPUT"
          echo "mcp=ghcr.io/${OWNER}/reasoning-bank-sdk-mcp" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs[matrix.image_key] }}:latest
            ${{ steps.image.outputs[matrix.image_key] }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
